<!DOCTYPE html>
<html>
<head>
    <title>Update Item</title>
    <style>
        body { font-family: Arial; margin: 40px; }
        input[type=text], input[type=number] { padding: 5px; width: 150px; }
        input[type=submit] { padding: 5px 15px; }
    </style>
</head>
<body>
    <h1>Update Item</h1>
    <form method="POST">
        <input type="text" name="product_name" value="{{ item[1] }}" required>
        <input type="number" name="price" value="{{ item[2] }}" step="0.01" required>
        <input type="number" name="quantity" value="{{ item[3] }}" min="1" required>
        <input type="submit" value="Update">
    </form>
    <p><a href="/">Back to Cart</a></p>
</body>
</html>
